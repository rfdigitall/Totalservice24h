<!doctype html>
<html lang="it-IT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Richiesta inviata | Total Service 24H</title>
  <link rel="icon" href="./img/logo.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@700&family=Inter:wght@400;500;600&family=Roboto+Slab:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/site.css" />
  <style>
    body.grazie-page {
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; padding-bottom: 1.5rem;
    }
    .grazie-card {
      max-width: 26rem; width: 100%;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 12px; padding: 2rem 1.5rem; text-align: center;
    }
    .grazie-card .logo__img { margin: 0 auto 1.25rem; }
    .grazie-card h1 {
      font-family: 'Roboto Slab', serif; font-size: 1.35rem;
      margin: 0 0 .75rem;
    }
    .grazie-card p { color: var(--muted); font-size: .92rem; line-height: 1.6; margin: 0 0 1rem; }
    .grazie-card .btn-mech { margin-top: .5rem; }
    .grazie-card .btn-outline {
      display: inline-flex; width: 100%; justify-content: center;
      margin-top: .5rem; padding: .75rem; border-radius: 6px;
      border: 1px solid var(--line); color: var(--muted); font-size: .85rem;
    }
    .grazie-card .note { font-size: .72rem; color: var(--muted); margin-top: 1rem; }
  </style>
</head>
<body class="grazie-page">
  <div class="grazie-card">
    <img src="./img/logo.svg" alt="Total Service 24H" class="logo__img" width="200" height="64" />
    <h1>Richiesta inviata</h1>
    <p id="msg">Resta su WhatsApp: un operatore ti risponderà al più presto per confermare l'intervento.</p>
    <a class="btn-mech btn-mech--xl" href="tel:+393927398625">Chiama 392 739 8625</a>
    <a class="btn-outline" id="back" href="./fabbro.html">Torna al sito</a>
    <p class="note">Tempi indicativi soggetti a disponibilità — conferma al telefono.</p>
  </div>
  <script>
    var p = new URLSearchParams(location.search);
    var svc = p.get('svc') || 'fabbro';
    document.getElementById('back').href = svc === 'idraulico' ? './idraulico.html' : './fabbro.html';
    if (svc === 'idraulico') {
      document.getElementById('msg').textContent =
        'Richiesta idraulico inviata su WhatsApp. Un operatore confermerà i tempi di intervento.';
    }
  </script>
</body>
</html>
